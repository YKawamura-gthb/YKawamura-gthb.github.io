name: Update Google Scholar data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node tools/update-scholar-stats.js
      - run: node tools/update-publications.js
      - name: Commit updated Scholar data
        run: |
          if git diff --quiet -- scholar-stats.json publications.json site-data.js; then
            echo "Scholar data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scholar-stats.json publications.json site-data.js
          git commit -m "Update Google Scholar data"
          git push
